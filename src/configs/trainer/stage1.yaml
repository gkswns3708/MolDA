# @package _global_
# Stage 1: LLM Text-Only Pretraining
# Trainable: LoRA + embed_tokens + lm_head
# Frozen:    Q-Former, GNN, LLM base weights
defaults:
  - default
  - _self_

stage: 1

# default.yaml에서 변경이 없는 항목은 생략
# model.mol_representation: string_only (default 그대로)
# model.tune_gnn: false (default 그대로)

lr:
  # Decay: base_lr/10으로 마지막 10% iterations에서 감소
  lora: 2.5e-4              # LoRA parameters
                            # Schedule: 0 → 2.5e-4 (50 iter) → 2.5e-5 (decay)

  embed_orig: 2.5e-5        # embedding_tokens (기존 vocab, idx < original_vocab_size)
                            # Schedule: 0 → 2.5e-5 (50 iter) → 2.5e-6 (decay)

  embed_new: 2.5e-5          # embedding_tokens (신규 vocab, idx >= original_vocab_size)
                            # add_mol_dict=false일 때는 embed_orig과 동일하게 적용

  head_orig: 2.5e-5         # lm_head (기존 vocab); weight_tying=True면 사용 안 됨
  head_new: 2.5e-5          # lm_head (신규 vocab); weight_tying=True면 사용 안 됨

  other: 0.0                # Q-Former/GNN frozen in Stage 1

logging:
  dir: ./checkpoint/stage1
  weight_norm_layers: [wte, lora]
