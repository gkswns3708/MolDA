# @package _global_
# Stage 1: LLM Text-Only Pretraining
# Trainable: LoRA + embed_tokens + lm_head
# Frozen:    Q-Former, GNN, LLM base weights
defaults:
  - default
  - _self_

stage: 1

# default.yaml에서 변경이 없는 항목은 생략
# model.mol_representation: string_only (default 그대로)
# model.tune_gnn: false (default 그대로)

lr:
  # Base: 2.5e-5 + LoRA 100배 (2.5e-3)
  # Decay: base_lr/10으로 마지막 10% iterations에서 감소
  lora: 2.5e-3              # LoRA: 2.5e-5 × 100배 (user request)
                            # Schedule: 0 → 2.5e-3 (50 iter) → 2.5e-4 (decay)

  embed_orig: 2.5e-5        # embedding_tokens (기존 vocab)
                            # Schedule: 0 → 2.5e-5 (50 iter) → 2.5e-6 (decay)

  embed_new: 2.5e-5         # embedding_tokens (신규 SELFIES vocab)
                            # Same as embed_orig
                            # Schedule: 0 → 2.5e-5 (50 iter) → 2.5e-6 (decay)

  head_orig: 2.5e-5         # lm_head/ff_out (기존 vocab)
                            # Schedule: 0 → 2.5e-5 (50 iter) → 2.5e-6 (decay)

  head_new: 2.5e-5          # lm_head/ff_out (신규 vocab)
                            # Same as head_orig
                            # Schedule: 0 → 2.5e-5 (50 iter) → 2.5e-6 (decay)

  other: 0.0                # Q-Former/GNN frozen in Stage 1

logging:
  dir: ./checkpoint/stage1
  weight_norm_layers: [wte, ff_out, lora]
