# @package _global_
# Stage 3: Full Multimodal Fine-tuning (+ MolPO optional)
# Trainable: LoRA + wte(embed, tied to output) + Q-Former + GNN
# Frozen:    LLM base weights만
defaults:
  - default
  - _self_

stage: 3

model:
  mol_representation: string+graph
  tune_gnn: true

training:
  max_epochs: 3                # ⬅ DPO 류는 1-3 epoch 표준 (Stage 2 가 이미 수렴 후 시작)
  batch_size: 1
  global_batch_size: 1024

lr:
  lora: ???
  embed_orig: ???
  embed_new: ???            # Stage 1보다 낮게 설정 권장
  head_orig: ???            # weight_tying=True: 별도 ff_out 없어 사용 안 됨
  head_new: ???             # weight_tying=True: 별도 ff_out 없어 사용 안 됨
  other: ???                # Q-Former, GNN, query_tokens, opt_proj, ln_graph

# ─────────────────────────────────────────────
# V-MolPO (Variance-Reduced MolPO)
# Phase 0 측정 결과 (2026-05-10) 반영:
#   n_t=2 sweet spot, antithetic 99.7% 분산 제거 → 둘 다 활성화 권장
#   상세: plan/stage3.md §2 (Phase 0 결과)
# ─────────────────────────────────────────────
molpo:
  enabled: true
  # Loss: L_total = sft_weight × L_SFT + molpo_weight × L_pref + anc_rejected_weight × L_anchor
  sft_weight: 1.0
  molpo_weight: 0.25        # 논문 권장값 (c = 0.25)
  anc_rejected_weight: 0.0  # anchor_rejected loss 계수 (default: 끔)
  rejected_lambda: 1.5      # anchor 의 rejected scaling

  # Preference optimization hyperparameters
  beta: 0.1                 # temperature (logit scaling). LLaDA 1.5 권장 = 0.1
  gamma_beta_ratio: 0.5     # γ/β 비율 (margin clip 보조)

  # Task-adaptive margin: γ_i = lambda × |E[r_w,i]|
  lambda: 0.5               # margin scaling coefficient (논문 권장: 0.5)
  margin_clip_scale: 1.0    # margin clipping threshold λ_clip (inactive when burn_in=0)
  margin_clip_burn_in: 0    # 0 = disabled (VRPO/MolPO 둘 다 필수 아님). ablation 시 늘려서 활성화.
  ema_alpha: 0.99           # TaskAnchorEMA smoothing (1% update per step)
  loss_type: sigmoid
  batch_division: 2         # 2: (chosen, rejected) pair | 3: + sft slice
  exclude_mol_tokens: false # graph token 을 loss 에서 제외할지 여부
  require_pair: true        # collator 가 chosen/rejected 없는 sample 만나면 raise

  # VRPO (Variance-Reduced Preference Optimization, LLaDA 1.5)
  n_t: 2                    # MC 평균 timestep 수 (Phase 0 sweet spot)
  antithetic: true          # πθ ↔ πref (T, M) 공유 (필수)
  ref_ckpt_path: ???        # π_ref ckpt 경로 (Stage 2 last.ckpt, CLI 로 override)

validation:
  check_val_every_n_epoch: 1
  inference_batch_size: 4   # MolPO batch doubling으로 실질 8 → OOM 방지

logging:
  dir: ./checkpoint/stage3
  # LLaDA layer names: wte=embedding (weight_tying=True, tied to output)
  weight_norm_layers: [wte, gnn, Qformer, lora]
