# @package _global_
# Stage 3: Full Multimodal Fine-tuning (+ MolPO optional)
# Trainable: LoRA + wte(embed) + ff_out(head) + Q-Former + GNN
# Frozen:    LLM base weights만
defaults:
  - default
  - _self_

stage: 3

model:
  mol_representation: string+graph
  tune_gnn: true

training:
  max_epochs: 6
  batch_size: 1
  accumulate_grad_batches: 10

lr:
  lora: ???
  embed_orig: ???
  embed_new: ???            # Stage 1보다 낮게 설정 권장
  head_orig: ???
  head_new: ???
  other: ???                # Q-Former, GNN, query_tokens, opt_proj, ln_graph

# ─────────────────────────────────────────────
# MolPO (Molecular Preference Optimization)
# ─────────────────────────────────────────────
molpo:
  enabled: true
  # Loss: L_total = sft_weight × L_SFT + molpo_weight × L_MolPO
  sft_weight: 1.0
  molpo_weight: 0.25        # 논문 권장값 (c = 0.25)
  # Preference optimization hyperparameters
  beta: 1.0                 # temperature (logit scaling)
  gamma_beta_ratio: 0.5     # γ/β 비율
  # Task-adaptive margin: γ_i = lambda × |E[r_w,i]|
  lambda: 0.5               # margin scaling coefficient (논문 권장: 0.5)
  margin_clip_scale: 1.0    # margin clipping threshold λ_clip
  loss_type: sigmoid
  batch_division: 2         # 2: (chosen, rejected) pair
  exclude_mol_tokens: false  # graph token을 loss에서 제외할지 여부

validation:
  check_val_every_n_epoch: 1
  inference_batch_size: 4   # MolPO batch doubling으로 실질 8 → OOM 방지

logging:
  dir: ./checkpoint/stage3
  # LLaDA layer names: wte=embedding, ff_out=lm_head
  weight_norm_layers: [wte, ff_out, gnn, Qformer, lora]
