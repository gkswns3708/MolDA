# Top-level config for test suite (pytest)
# trainer/default.yaml에 정의된 설정을 그대로 사용
# max_length=512, gen_max_len=256 프로덕션 동일
defaults:
  - trainer: stage1
  - data: toy100
  - _self_

# Runtime
seed: 42
mode: ft
ckpt_path: null
debug: false

# WandB 비활성화
wandb:
  enabled: false
  project: MolDA
  entity: null
  run_name: null

# Hydra
hydra:
  run:
    dir: .
  sweep:
    dir: .
  job:
    chdir: false
  output_subdir: logs/.hydra
  job_logging:
    handlers:
      file:
        filename: logs/test.log
