# @package _global_
# ───────────────────────────────────────────────────
# Experiment A: SELFIES + molecular dictionary
# ───────────────────────────────────────────────────
# Usage:
#   python scripts/train.py +experiment=selfies_dict trainer=stage1
#   python scripts/train.py +experiment=selfies_dict trainer=stage2 \
#       pretrained_ckpt_path=./checkpoint/selfies_dict/stage1/last.ckpt

defaults:
  - override /data: SELFIES_chebi-20-mol2text_v1

model:
  weight_tying: false

lora:
  modules_to_save: [wte, ff_out]

tokenizer:
  mol_token_type: selfies
  add_mol_dict: true

wandb:
  enabled: true
  project: MolDA
  run_name: selfies_dict_s${stage}
  tags: [selfies, dict, chebi-20-mol2text_v1]
  group: selfies_dict

logging:
  dir: ./checkpoint/selfies_dict/stage${stage}
