# @package _global_
# ───────────────────────────────────────────────────
# Experiment A: SELFIES + molecular dictionary
# ───────────────────────────────────────────────────
# Usage:
#   python scripts/train.py +experiment=selfies_dict trainer=stage1
#   python scripts/train.py +experiment=selfies_dict trainer=stage2 \
#       pretrained_ckpt_path=./checkpoint/selfies_dict/stage1/last.ckpt

defaults:
  - override /data: toy15

model:
  weight_tying: false

lora:
  modules_to_save: [wte, ff_out]

tokenizer:
  mol_token_type: selfies
  add_mol_dict: true

training:
  max_epochs: 200
  global_batch_size: 1029

validation:
  check_val_every_n_epoch: 1

wandb:
  enabled: true
  project: MolDA
  run_name: selfies_dict_chebi-20-mol2text_s${stage}
  tags: [selfies, dict, chebi-20-mol2text]
  group: selfies_dict_chebi-20-mol2text

logging:
  dir: ./checkpoint/selfies_dict_chebi-20-mol2text/stage${stage}
